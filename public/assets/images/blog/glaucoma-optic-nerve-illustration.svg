<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Glaucoma optic nerve modern illustration</title>
  <desc id="desc">Modern medical illustration of optic nerve monitoring, eye pressure, and visual field rings.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".48" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="58%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity=".38"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="1" stop-color="#dbeafe" stop-opacity=".84"/>
    </linearGradient>
    <linearGradient id="iris" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="28" stdDeviation="28" flood-color="#0f172a" flood-opacity=".22"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="930" cy="70" r="240" fill="url(#glow)"/>
  <circle cx="162" cy="560" r="260" fill="#a3e635" opacity=".12"/>
