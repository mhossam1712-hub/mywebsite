<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">OCT retina scan modern illustration</title>
  <desc id="desc">Modern medical illustration of OCT retinal layers and digital analysis markers.</desc>
  <defs>
