<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting to Online Eye Tests | Abdalla Eye Clinic</title>
    <meta
      name="description"
      content="This legacy near-vision screening page has moved to the localized Abdalla Eye Clinic eye-test tools."
    />
    <meta http-equiv="refresh" content="0; url=/en/eye-tests" />
    <link rel="canonical" href="https://www.abdallaeyeclinic.com/en/eye-tests" />
    <link rel="alternate" hreflang="en" href="https://www.abdallaeyeclinic.com/en/eye-tests" />
    <link rel="alternate" hreflang="ar" href="https://www.abdallaeyeclinic.com/ar/eye-tests" />
    <link rel="alternate" hreflang="x-default" href="https://www.abdallaeyeclinic.com/en/eye-tests" />
    <script>
      const target = navigator.language && navigator.language.toLowerCase().startsWith('ar')
        ? '/ar/eye-tests'
        : '/en/eye-tests';
      window.location.replace(target);
    </script>
  </head>
  <body>
    <main>
      <h1>Near-Vision Screening Test Has Moved</h1>
      <p>
        This legacy page now redirects to the localized online eye-test tools.
        Continue to <a href="/en/eye-tests">English eye tests</a> or
        <a href="/ar/eye-tests">Arabic eye tests</a>.
      </p>
    </main>
  </body>
</html>
